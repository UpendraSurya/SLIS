<!DOCTYPE html>
<!--
  SLIS Design System — Student Portal UI Kit
  Interactive prototype. Falls back to mock data when API unavailable.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLIS — Student Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg-base); color: var(--fg-1);
    font-family: var(--font-body); font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased; overflow: hidden; height: 100vh;
    background-image:
      radial-gradient(ellipse 600px 400px at 90% -10%, rgba(79,127,255,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 500px 500px at -5% 110%, rgba(79,127,255,0.04) 0%, transparent 70%);
  }

  .app-shell    { display: flex; height: 100vh; }
  .sidebar      { width: 228px; flex-shrink: 0; background: rgba(17,17,17,0.85); backdrop-filter: blur(12px); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  .main-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
  .topbar       { height: 52px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 28px; gap: 12px; flex-shrink: 0; background: rgba(8,8,8,0.7); backdrop-filter: blur(8px); }
  .page-body    { padding: 28px 32px; flex: 1; }

  .sidebar-logo    { padding: 20px 18px; border-bottom: 1px solid var(--border); }
  .sidebar-brand   { font-family: var(--font-display); font-size: 17px; font-weight: 700; letter-spacing: -0.02em; }
  .sidebar-sub     { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); margin-top: 3px; letter-spacing: 0.04em; }
  .sidebar-section { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); letter-spacing: 0.08em; text-transform: uppercase; padding: 16px 18px 6px; }
  .nav-item        { display: flex; align-items: center; gap: 10px; height: 38px; padding: 0 12px; margin: 2px 8px; font-size: 13px; color: var(--fg-2); cursor: pointer; border-radius: 8px; transition: background 120ms, color 120ms; }
  .nav-item:hover  { background: var(--bg-elevated); color: var(--fg-1); }
  .nav-item.active { background: linear-gradient(135deg, rgba(79,127,255,0.18), rgba(79,127,255,0.08)); color: var(--fg-1); border: 1px solid rgba(79,127,255,0.2); }
  .sidebar-footer  { margin-top: auto; border-top: 1px solid var(--border); padding: 14px 18px; display: flex; align-items: center; gap: 10px; }
  .avatar          { width: 30px; height: 30px; background: var(--accent-dim); border: 1px solid rgba(79,127,255,0.4); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 10px; color: var(--accent-text); flex-shrink: 0; }
  .logout-btn      { margin-left: auto; background: none; border: none; color: var(--fg-3); cursor: pointer; display: flex; align-items: center; padding: 6px; border-radius: 6px; transition: background 120ms, color 120ms; }
  .logout-btn:hover { background: var(--bg-elevated); color: var(--fg-1); }

  .topbar-title      { font-family: var(--font-display); font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
  .topbar-breadcrumb { font-family: var(--font-mono); font-size: 12px; color: var(--fg-3); }
  .topbar-sep        { color: var(--border-strong); }

  .badge { display: inline-flex; align-items: center; font-family: var(--font-mono); font-size: 10px; font-weight: 500; letter-spacing: 0.05em; padding: 3px 10px; border-radius: 20px; }
  .badge-high   { background: var(--risk-high-dim); color: var(--risk-high); border: 1px solid rgba(255,68,68,0.3); }
  .badge-medium { background: var(--risk-med-dim);  color: var(--risk-med);  border: 1px solid rgba(255,153,0,0.3); }
  .badge-low    { background: var(--risk-low-dim);  color: var(--risk-low);  border: 1px solid rgba(34,197,94,0.3); }

  .btn { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-body); font-size: 13px; font-weight: 500; cursor: pointer; padding: 8px 16px; border: 1px solid transparent; border-radius: 8px; transition: background 120ms, transform 80ms; }
  .btn:active { transform: scale(0.98); }
  .btn-primary   { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary { background: transparent; color: var(--fg-1); border-color: var(--border-strong); }
  .btn-secondary:hover { background: var(--bg-elevated); }
  .btn-sm { padding: 5px 12px; font-size: 12px; }

  .input { background: var(--bg-elevated); border: 1px solid var(--border-strong); color: var(--fg-1); font-family: var(--font-body); font-size: 13px; padding: 9px 14px; border-radius: 8px; outline: none; transition: border-color 120ms, box-shadow 120ms; }
  .input::placeholder { color: var(--fg-3); }
  .input:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px rgba(79,127,255,0.12); }

  .stat-grid  { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }
  .stat-card  { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 22px; }
  .stat-label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .stat-value { font-family: var(--font-display); font-size: 32px; font-weight: 700; letter-spacing: -0.03em; }
  .stat-sub   { font-size: 11px; color: var(--fg-3); margin-top: 5px; }

  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .section-title  { font-family: var(--font-display); font-size: 14px; font-weight: 600; }

  .table-wrap { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { font-family: var(--font-mono); font-size: 10px; font-weight: 500; letter-spacing: 0.08em; color: var(--fg-3); text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--border); text-transform: uppercase; background: var(--bg-base); }
  td { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  tr:nth-child(even) td { background: rgba(255,255,255,0.015); }

  .rec-card  { background: var(--bg-surface); border: 1px solid var(--border); border-left-width: 3px; border-radius: 12px; padding: 16px 18px; margin-bottom: 12px; }
  .rec-title { font-family: var(--font-display); font-size: 14px; font-weight: 600; margin-bottom: 6px; }
  .rec-desc  { font-size: 13px; color: var(--fg-2); line-height: 1.55; }

  .risk-bar-track { height: 5px; background: var(--border); width: 100%; border-radius: 20px; overflow: hidden; }
  .risk-bar-fill  { height: 100%; border-radius: 20px; }
  .score-bar-track { flex: 1; height: 6px; background: var(--border); border-radius: 20px; overflow: hidden; }
  .score-bar-fill  { height: 100%; background: var(--accent); border-radius: 20px; }
  .divider     { height: 1px; background: var(--border); margin: 16px 0; }
  .loading     { display: flex; align-items: center; gap: 8px; color: var(--fg-3); font-family: var(--font-mono); font-size: 12px; padding: 48px; }
  .two-col     { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .inner-panel { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }

  .trend-up   { color: var(--risk-low); }
  .trend-down { color: var(--risk-high); }
  .trend-flat { color: var(--fg-3); }

  /* Hero */
  .risk-hero { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 14px; padding: 26px 28px; display: flex; align-items: center; gap: 28px; margin-bottom: 24px; }
  .risk-hero-score { font-family: var(--font-display); font-size: 52px; font-weight: 700; letter-spacing: -0.04em; line-height: 1; }
  .risk-hero-label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 6px; }
  .risk-sep   { width: 1px; height: 60px; background: var(--border); }

  /* Login */
  .login-page {
    width: 100%; height: 100vh; display: flex;
    background-image:
      radial-gradient(ellipse 700px 500px at 100% 0%, rgba(79,127,255,0.08) 0%, transparent 65%),
      radial-gradient(ellipse 500px 600px at 0% 100%, rgba(79,127,255,0.05) 0%, transparent 65%);
  }
  .login-left  { flex: 1; display: flex; flex-direction: column; justify-content: space-between; padding: 48px 56px; background: rgba(17,17,17,0.5); border-right: 1px solid var(--border); position: relative; overflow: hidden; }
  .login-shapes { position: absolute; inset: 0; pointer-events: none; }
  .login-right  { width: 420px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; padding: 48px 40px; }
  .login-form   { width: 100%; }
  .login-brand  { font-family: var(--font-display); font-size: 36px; font-weight: 700; letter-spacing: -0.04em; }
  .login-tagline { font-size: 14px; color: var(--fg-2); margin-top: 8px; max-width: 340px; line-height: 1.6; }
  .login-stat-n { font-family: var(--font-display); font-size: 28px; font-weight: 700; letter-spacing: -0.03em; }
  .login-stat-l { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
  .login-heading { font-family: var(--font-display); font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 6px; }
  .login-sub   { font-size: 13px; color: var(--fg-3); margin-bottom: 28px; }
  .login-field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 14px; }
  .login-label { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.06em; }
  .login-error { font-size: 12px; color: var(--risk-high); margin-top: 6px; padding: 8px 12px; background: var(--risk-high-dim); border-radius: 6px; border: 1px solid rgba(255,68,68,0.2); }
</style>
</head>
